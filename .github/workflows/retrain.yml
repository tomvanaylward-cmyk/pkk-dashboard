name: Retrain PKK model & deploy

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run training pipeline
        run: python scripts/train.py

      - name: Commit updated coefficients
        run: |
          git config user.name  "pkk-bot"
          git config user.email "pkk-bot@users.noreply.github.com"
          git stash
          git pull --rebase origin main
          git stash pop
          git add docs/coefficients.json
          git diff --staged --quiet || git commit -m "chore: retrain model $(date -u +%Y-%m-%d)"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: false
