name: Retrain PKK model & deploy

on:
  schedule:
    - cron: "0 3 * * *"   # 03:00 UTC every day
  workflow_dispatch:        # manual trigger from GitHub UI

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  train-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run training pipeline
        run: python scripts/train.py

      - name: Check if coefficients changed
        id: diff
        run: |
          git diff --quiet docs/coefficients.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit updated coefficients
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "pkk-bot"
          git config user.email "pkk-bot@users.noreply.github.com"
          git add docs/coefficients.json
          git commit -m "chore: retrain model $(date -u +%Y-%m-%d)"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: false
